{% extends "main/base.html" %}

{% block title %}Категории — Skystore{% endblock %}

{% block content %}

<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">Категории</h1>

    <div class="mb-3 text-end">
        <a href="{% url 'catalog:category_create' %}" class="btn btn-success">+ Добавить категорию</a>
    </div>

    <ul class="list-group">
        {% for category in categories %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <a href="{% url 'catalog:category_detail' category.id %}">{{ category.name }}</a>
            <div>
                <a href="{% url 'catalog:category_edit' category.id %}" class="btn btn-sm btn-warning">Редактировать</a>
                <a href="{% url 'catalog:category_delete' category.id %}" class="btn btn-sm btn-danger">Удалить</a>
            </div>
        </li>
        {% endfor %}
    </ul>
</div>

<div class="container">

</div>

{% endblock %}
