{% extends "main/base.html" %}

{% block title %}Удаление статьи — Skystore{% endblock %}

{% block content %}
<h2 class="mb-4">Удалить статью?</h2>
<p>Вы уверены, что хотите удалить статью «{{ object.title }}»?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'blog:post_detail' object.pk %}" class="btn btn-outline-secondary ms-2">Отмена</a>
</form>
{% endblock %}
