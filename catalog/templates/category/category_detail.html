{% extends "main/base.html" %}

{% block title %}{{ category.name }} — Skystore{% endblock %}

{% block content %}

<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">{{ category.name }}</h1>
    <p>{{ category.description }}</p>
    <a href="{% url 'catalog:category_edit' category.id %}" class="btn btn-warning">Редактировать</a>
    <a href="{% url 'catalog:category_delete' category.id %}" class="btn btn-danger">Удалить</a>
</div>

<div class="text-center">
    <a href="{% url 'catalog:category_list' %}" class="btn btn-outline-info">Все категории</a>
</div>

{% endblock %}
