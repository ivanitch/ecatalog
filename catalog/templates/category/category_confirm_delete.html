{% extends "base.html" %}

{% block title %}Удаление категории — Skystore{% endblock %}

{% block content %}
<div class="container text-center mt-5" style="max-width: 500px;">
    <div class="card border-danger text-dark mb-3">
        <div class="card-header bg-danger text-white"><h5>Удаление категории</h5></div>
        <div class="card-body">
            <p class="card-text">Вы уверены, что хотите удалить категорию <strong>{{ object.name }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Да, удалить</button>
                <a href="{% url 'catalog:category_list' %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
